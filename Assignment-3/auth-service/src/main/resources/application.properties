# ===================================================================
# Spring Boot Configuration File
# Role: Configures system settings, database connections, and environment-specific parameters.
# Interactions: Read by the Spring framework at startup to wire the datasources, security constants, and ORM parameters.
# ===================================================================

# Server Port Configuration
server.port=8080

# PostgreSQL Database Connection Settings
spring.datasource.url=jdbc:postgresql://localhost:5422/auth_assignment_db
spring.datasource.username=postgres
spring.datasource.password=admin123
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate JPA Settings
# ddl-auto: 'update' dynamically updates the schema, 'create-drop' drops the database on shutdown (ideal for tests)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Custom JWT Configuration Properties
# jwt.secret must be a Base64-encoded string of at least 256 bits (32 bytes) for HS256 algorithm
app.jwt.secret=9a4f2c8d3b7a1e5f8c3d2e1a7b6f8e9c0a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d
# Expiration time in milliseconds: 86400000 ms = 24 hours
app.jwt.expiration-ms=86400000
